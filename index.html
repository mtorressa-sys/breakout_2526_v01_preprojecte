<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="UTF-8">
        <title>BreackOut 25-26</title>
        <link rel="stylesheet" href="css/estils.css">
    </head>
<body>
    <div id="principal">

        <!-- Pantalla d'inici -->
        <div id="inici">
            <h2>BreakOut 25-26</h2>
            <p>Tria el nivell:</p>
            <div id="nivells">
                <button class="btn-nivell seleccionat" data-nivell="0">Nivell 1</button>
                <button class="btn-nivell" data-nivell="1">Nivell 2</button>
                <button class="btn-nivell" data-nivell="2">Nivell 3</button>
            </div>
            <button id="btn-comecar">Començar</button>
        </div>

        <!-- Contenidor joc + overlay -->
        <div id="joc-wrap" style="display:none; position:relative; width:fit-content; margin:0 auto;">
            <canvas id="joc"></canvas>

            <!-- Overlay Game Over -->
            <div id="overlay-gameover">
                <h2>Game Over</h2>
                <p>Vols tornar a intentar-ho?</p>
                <div id="btns-gameover">
                    <button id="btn-reiniciar">Tornar a jugar</button>
                    <button id="btn-setup">Setup</button>
                </div>
            </div>
        </div>

    </div>
</body>

<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui.min.js"></script>
<script src="js/punt.js"></script>
<script src="js/segment.js"></script>
<script src="js/totxo.js"></script>
<script src="js/mur.js"></script>
<script src="js/pala.js"></script>
<script src="js/bola.js"></script>
<script src="js/joc.js"></script>
<script src="js/app.js"></script>

</html>
